services:
  assistant:
    build: .
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${OA_WEBHOOK_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - OA_BAILEYS_BRIDGE_URL=http://baileys:3100
      # Unset API key so claude CLI uses OAuth from the named volume instead
      - ANTHROPIC_API_KEY=
      - CLAUDE_CODE_OAUTH_TOKEN=
    volumes:
      # Schedules + sessions (bind mount — stays in sync with host)
      - ${HOME}/.open-assistant:/root/.open-assistant
      # GWS auth — tokens live on the host at ~/.config/gws (run `gws auth login` before starting)
      - ${HOME}/.config/gws:/root/.config/gws:ro
      # Claude Code auth (persistent volume — exchanged via setup.sh using claude setup-token)
      - claude-auth:/root/.claude
      # Memory — seeded from Mac on first run
      - ${HOME}/.claude/projects:/initial-memory:ro
      # GWS plain credentials (path hardcoded in gws config)
      - ${PWD}/gws-creds.json:/root/gws-creds.json:ro
      # Claude settings — bind-mounted so changes take effect without rebuild
      - ${PWD}/.claude/settings.json:/root/.claude/settings.json:ro
      # Host filesystem access for find skill
      - ${HOME}/projects:/root/projects:ro
      - ${HOME}/Downloads:/root/Downloads:ro
      - ${HOME}/Documents:/root/Documents:ro
    depends_on:
      - baileys
    restart: unless-stopped

  baileys:
    build: ./baileys-bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${BAILEYS_PORT:-3100}:3100"
    environment:
      - BAILEYS_PORT=3100
      - BAILEYS_CALLBACK_URL=http://assistant:8080/webhook/whatsapp/baileys
      - BAILEYS_ACK_MESSAGE=${BAILEYS_ACK_MESSAGE:-}
    volumes:
      - baileys-auth:/app/auth_state
    restart: unless-stopped

volumes:
  claude-auth:
  baileys-auth:
